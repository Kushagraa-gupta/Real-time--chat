services:
  # Chatbot Backend Service
  - type: web
    name: chatbot-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: http://localhost:3000 # Update this with the frontend URL once deployed

databases:
  # Managed PostgreSQL Database
  - name: chatbot-db
    plan: free
    postgresDatabase: chatbot_db
